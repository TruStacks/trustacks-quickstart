{{/*
Runner SA + Role + RoleBinding.

The runner's `load-deploy-keys` init container needs `get/list` on
Secrets labeled `trustacks.io/role=git-deploy-key` so it can materialize
per-repo SSH keys at pod startup. This is the same RBAC the mvp
charts/runner/templates/{serviceaccount,role}.yaml templates set up.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner
  namespace: {{ .Release.Namespace }}
  labels: {{- include "quickstart.serviceLabels" (dict "ctx" . "service" "runner") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner
  namespace: {{ .Release.Namespace }}
  labels: {{- include "quickstart.serviceLabels" (dict "ctx" . "service" "runner") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner
  namespace: {{ .Release.Namespace }}
  labels: {{- include "quickstart.serviceLabels" (dict "ctx" . "service" "runner") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runner
subjects:
  - kind: ServiceAccount
    name: runner
    namespace: {{ .Release.Namespace }}
