apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Release.Namespace }}
  labels: {{- include "quickstart.serviceLabels" (dict "ctx" . "service" "ui") | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.ui }}
  selector:
    matchLabels: {{- include "quickstart.serviceSelectorLabels" (dict "service" "ui") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "quickstart.serviceSelectorLabels" (dict "service" "ui") | nindent 8 }}
    spec:
      containers:
        - name: ui
          image: "{{ .Values.image.ui.repository }}:{{ .Values.image.ui.tag }}"
          imagePullPolicy: {{ .Values.image.ui.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
