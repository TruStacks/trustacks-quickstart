apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: {{ .Release.Namespace }}
  labels: {{- include "quickstart.serviceLabels" (dict "ctx" . "service" "ui") | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "quickstart.serviceSelectorLabels" (dict "service" "ui") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
